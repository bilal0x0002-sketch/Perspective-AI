<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspective AI — Debate Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #0f172a;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.16), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 24%);
            pointer-events: none;
        }
        .page-shell {
            position: relative;
            width: 100%;
            max-width: 1480px;
            margin: 0 auto;
            padding: 30px 24px 48px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .headline {
            max-width: 860px;
        }
        .headline .eyebrow {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            color: #4338ca;
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .headline h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 3.1rem);
            line-height: 1.05;
        }
        .headline p {
            margin: 18px 0 0;
            color: #475569;
            font-size: 1rem;
            line-height: 1.8;
            max-width: 820px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .status-pill,
        .workflow-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 999px;
            color: #164e63;
            background: #dcfce7;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .workflow-pill {
            background: #eef2ff;
            color: #4338ca;
        }
        .button-primary,
        .button-secondary,
        .button-export {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 16px;
            padding: 14px 22px;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .button-primary:hover,
        .button-secondary:hover,
        .button-export:hover {
            transform: translateY(-1px);
        }
        .button-primary {
            color: white;
            background: linear-gradient(135deg, #7c3aed, #22c55e);
            box-shadow: 0 16px 32px rgba(124, 58, 237, 0.2);
        }
        .button-export {
            color: #0f172a;
            background: white;
            border: 1px solid rgba(15, 23, 42, 0.12);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        .main-card {
            display: grid;
            gap: 24px;
            margin-bottom: 24px;
            background: white;
            border-radius: 32px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.06);
            padding: 28px;
        }
        .query-panel {
            display: grid;
            gap: 18px;
        }
        .query-panel .eyebrow {
            color: #7c3aed;
            margin-bottom: 0;
        }
        .query-panel h2 {
            margin: 0;
            font-size: clamp(1.9rem, 2.4vw, 2.6rem);
            line-height: 1.05;
        }
        .query-panel p {
            margin: 0;
            color: #475569;
            line-height: 1.75;
        }
        .query-panel textarea {
            width: 100%;
            min-height: 180px;
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            padding: 20px;
            font-size: 1rem;
            color: #0f172a;
            resize: vertical;
            background: #f8fafc;
        }
        .query-panel textarea:focus {
            border-color: #7c3aed;
            outline: none;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
        }
        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .hero-actions .tone {
            color: #475569;
            font-weight: 600;
        }
        .hero-actions .status-pill {
            margin-left: auto;
        }
        .conversation-card {
            display: grid;
            gap: 20px;
            border-radius: 28px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
            padding: 24px;
        }
        .conversation-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-end;
        }
        .conversation-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #0f172a;
        }
        .conversation-stream {
            display: grid;
            gap: 14px;
            max-height: 620px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .message {
            display: grid;
            gap: 10px;
            padding: 18px 20px;
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            background: white;
        }
        .message-system {
            background: rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.2);
        }
        .message-agent,
        .message-round {
            background: #eef2ff;
            border-color: rgba(99, 102, 241, 0.16);
        }
        .message-stage,
        .message-system {
            background: rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.2);
        }
        .message-user {
            background: #dcfce7;
            border-color: rgba(16, 185, 129, 0.18);
        }
        .message-summary {
            background: #f8fafc;
            border-color: rgba(15, 23, 42, 0.12);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .message-role {
            font-weight: 700;
            color: #0f172a;
            font-size: 0.96rem;
        }
        .message-meta {
            color: #64748b;
            font-size: 0.86rem;
        }
        .message-text {
            margin: 0;
            color: #334155;
            line-height: 1.75;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .message-note {
            color: #475569;
            font-size: 0.88rem;
        }
        .conversation-summary {
            display: grid;
            gap: 14px;
            padding: 20px;
            border-radius: 24px;
            background: white;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }
        .summary-card {
            padding: 18px;
            border-radius: 22px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
            display: grid;
            gap: 10px;
        }
        .summary-card strong {
            display: block;
            font-size: 1.45rem;
            color: #0f172a;
        }
        .summary-card span {
            color: #64748b;
            font-size: 0.92rem;
        }
        .summary-recommendation {
            margin: 0;
            color: #334155;
            line-height: 1.7;
        }
        .persona-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }
        .persona-card {
            padding: 22px;
            border-radius: 28px;
            background: white;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.06);
            min-height: 220px;
            display: grid;
            gap: 18px;
        }
        .persona-caption {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .persona-avatar {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 1.6rem;
            color: white;
            font-weight: 700;
            background: #7c3aed;
        }
        .persona-info {
            display: grid;
            gap: 8px;
        }
        .persona-info strong {
            display: block;
            font-size: 1rem;
        }
        .persona-info span {
            color: #64748b;
            font-size: 0.92rem;
        }
        .persona-chip {
            display: inline-flex;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.84rem;
            font-weight: 700;
            background: #eef2ff;
            color: #4338ca;
        }
        .persona-body {
            display: grid;
            gap: 14px;
        }
        .persona-body p {
            margin: 0;
            color: #475569;
            line-height: 1.65;
            font-size: 0.95rem;
        }
        .persona-keyissue {
            margin: 0;
            color: #0f172a;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .conversation-card {
            background: white;
            border-radius: 28px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.06);
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            gap: 18px;
        }
        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
        }
        .conversation-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #0f172a;
        }
        .conversation-stream {
            display: grid;
            gap: 16px;
        }
        .conversation-segment {
            display: grid;
            gap: 12px;
            padding: 18px;
            border-radius: 24px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .conversation-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
        }
        .conversation-item {
            display: grid;
            gap: 8px;
            padding: 16px 18px;
            border-radius: 22px;
            background: white;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .conversation-speaker {
            color: #0f172a;
            font-size: 0.96rem;
            font-weight: 700;
        }
        .conversation-text {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .conversation-meta {
            color: #64748b;
            font-size: 0.88rem;
        }
        .conversation-empty {
            display: grid;
            gap: 10px;
            padding: 16px;
            border-radius: 22px;
            background: #eef2ff;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .insights-grid {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 22px;
        }
        .insight-card {
            background: white;
            border-radius: 28px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.06);
            padding: 28px;
            display: grid;
            gap: 22px;
        }
        .insight-card h2 {
            margin: 0;
            font-size: 1.15rem;
        }
        .legal-list {
            display: grid;
            gap: 14px;
        }
        .legal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            border-radius: 22px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .legal-item strong {
            font-size: 0.95rem;
            color: #0f172a;
        }
        .legal-item span {
            color: #64748b;
            font-size: 0.88rem;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }
        .result-card {
            border-radius: 28px;
            padding: 28px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
            display: grid;
            gap: 18px;
        }
        .result-card strong {
            display: block;
            font-size: 2rem;
            color: #0f172a;
        }
        .result-card span {
            color: #64748b;
            font-size: 0.94rem;
        }
        .result-summary {
            border-radius: 24px;
            padding: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
            border: 1px solid rgba(124, 58, 237, 0.16);
            display: grid;
            gap: 12px;
        }
        .result-summary strong {
            display: block;
            font-size: 1.1rem;
            color: #0f172a;
        }
        .result-summary p {
            margin: 0;
            color: #475569;
            line-height: 1.75;
        }
        @media (max-width: 1080px) {
            .workflow-grid,
            .insights-grid,
            .hero-panel {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 760px) {
            .page-shell {
                padding: 20px 16px 32px;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: flex-start;
            }
            .persona-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function PerspectiveAI() {
            const defaultQuery = "Should the city implement congestion pricing in the downtown core?";
            const [query, setQuery] = useState(defaultQuery);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [messages, setMessages] = useState([]);
            const [activeStage, setActiveStage] = useState('Ready to debate');
            const [streamError, setStreamError] = useState(null);
            const [mode, setMode] = useState("offline");

            // Fetch actual mode from server on mount
            useEffect(() => {
                fetch('/api/config')
                    .then(r => r.json())
                    .then(data => setMode(data.mode))
                    .catch(err => console.error('Failed to fetch config:', err));
            }, []);

            const addMessage = (message) => {
                setMessages((prev) => [...prev, message].slice(-120));
            };

            const runDebate = () => {
                setLoading(true);
                setMessages([{ type: 'user', role: 'You', text: query, meta: 'Question' }]);
                setActiveStage('Starting live debate');
                setStreamError(null);
                setResult(null);

                const source = new EventSource(`/api/debate-stream?query=${encodeURIComponent(query)}`);

                source.addEventListener('stage', (e) => {
                    const payload = JSON.parse(e.data);
                    const stageText = payload.message || payload.stage || 'Working';
                    setActiveStage(stageText);
                    addMessage({ type: 'stage', role: 'System', text: stageText, meta: payload.perspective });
                });

                source.addEventListener('agent', (e) => {
                    const payload = JSON.parse(e.data);
                    const text = payload.position || `${payload.perspective} joins the debate.`;
                    addMessage({
                        type: 'agent',
                        role: payload.perspective || 'Agent',
                        text,
                        meta: `${payload.stance || 'No stance'} · ${formatPercent(payload.confidence)} confidence`,
                    });
                });

                source.addEventListener('round', (e) => {
                    const payload = JSON.parse(e.data);
                    const round = payload.round || {};
                    addMessage({
                        type: 'round',
                        role: round.speaker || 'Speaker',
                        text: round.statement || '',
                        meta: round.move || 'Statement',
                    });
                });

                source.addEventListener('done', (e) => {
                    const payload = JSON.parse(e.data);
                    setResult(payload);
                    setActiveStage('Debate complete');
                    addMessage({
                        type: 'summary',
                        role: 'Recommendation',
                        text: payload.summary?.recommendation || 'Debate complete.',
                        meta: `Support ${formatPercent(payload.summary?.agreement_level ?? payload.summary?.agreement)} · Confidence ${formatRating(payload.summary?.confidence ?? payload.summary?.average_confidence)}`,
                    });
                    setLoading(false);
                    source.close();
                });

                source.addEventListener('error', (e) => {
                    let errorText = 'Live stream error. The debate has been interrupted.';
                    try {
                        const payload = JSON.parse(e.data);
                        errorText = payload.message || errorText;
                    } catch (err) {
                        // ignore parsing error for network-level errors
                    }
                    setStreamError(errorText);
                    setActiveStage('Error while streaming debate');
                    setLoading(false);
                    source.close();
                });
            };

            const exportDebate = () => {
                if (!result) return;
                const payload = JSON.stringify(result, null, 2);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(payload).then(() => alert('Debate JSON copied to clipboard'));
                } else {
                    window.prompt('Copy the debate JSON:', payload);
                }
            };

            const formatPercent = (value, fallback = '-') => {
                if (typeof value === 'number') return `${Math.round(value * 100)}%`;
                if (typeof value === 'string' && /^\d+(\.\d+)?$/.test(value)) return `${Math.round(parseFloat(value) * 100)}%`;
                return fallback;
            };

            const formatRating = (value) => {
                if (typeof value === 'number') return `${Math.min(5, Math.max(0, Math.round(value * 10) / 10)).toFixed(1)}/5`;
                return '-/5';
            };

            const overallSupport = result?.summary?.agreement_level ?? result?.summary?.agreement ?? 0;
            const averageConfidence = result?.summary?.average_confidence ?? result?.summary?.confidence ?? 0;
            const evidenceCount = result?.summary?.evidence_count ?? 0;
            const summaryRecommendation = result?.summary?.recommendation || 'Run a debate to generate a recommended approach.';
            const recommendationLabel = result?.summary?.risk_balance || 'Balanced';

            return (
                <div className="page-shell">
                    <header className="dashboard-header">
                        <div className="headline">
                            <div className="eyebrow">Debate</div>
                            <h1>{result ? `Debate: ${result.query}` : 'Debate: Congestion Pricing in Downtown'}</h1>
                            <p>{query}</p>
                        </div>
                        <div className="header-actions">
                            <span className="status-pill">Live Debate</span>
                            <button className="button-export" onClick={exportDebate} disabled={!result}>Export</button>
                        </div>
                    </header>

                    <section className="main-card">
                        <div className="query-panel">
                            <div className="eyebrow">Ask the engine</div>
                            <h2>Compare roles, risks, and evidence in one continuous debate view.</h2>
                            <p>Enter a question to run a live, streaming debate and see the conversation unfold in one unified box.</p>
                            <textarea value={query} onChange={(e) => setQuery(e.target.value)} />
                            <div className="hero-actions">
                                <button className="button-primary" onClick={runDebate} disabled={loading}>
                                    {loading ? 'Running debate…' : 'Run debate'}
                                </button>
                                <span className="tone">Mode: <strong>{mode}</strong></span>
                                <span className="status-pill">{activeStage}</span>
                            </div>
                        </div>

                        <section className="conversation-card">
                            <div className="conversation-header">
                                <div>
                                    <div className="eyebrow">Live debate conversation</div>
                                    <h3>All personas and engine progress in one stream</h3>
                                </div>
                                <span className="workflow-pill">{messages.length} messages</span>
                            </div>
                            <div className="conversation-stream">
                                {messages.length > 0 ? messages.map((message, idx) => (
                                    <div key={idx} className={`message message-${message.type}`}>
                                        <div className="message-header">
                                            <span className="message-role">{message.role}</span>
                                            {message.meta && <span className="message-meta">{message.meta}</span>}
                                        </div>
                                        <p className="message-text">{message.text}</p>
                                    </div>
                                )) : (
                                    <div className="message message-system">
                                        <div className="message-header">
                                            <span className="message-role">Ready to debate</span>
                                        </div>
                                        <p className="message-text">Run a debate to watch the conversation build in one continuous live stream.</p>
                                    </div>
                                )}
                                {streamError && (
                                    <div className="message message-summary">
                                        <div className="message-header">
                                            <span className="message-role">Stream error</span>
                                        </div>
                                        <p className="message-text">{streamError}</p>
                                    </div>
                                )}
                            </div>

                            {result && (
                                <div className="conversation-summary">
                                    <div className="summary-grid">
                                        <div className="summary-card">
                                            <strong>{formatPercent(overallSupport)}</strong>
                                            <span>Overall support</span>
                                        </div>
                                        <div className="summary-card">
                                            <strong>{formatRating(averageConfidence)}</strong>
                                            <span>Average confidence</span>
                                        </div>
                                        <div className="summary-card">
                                            <strong>{evidenceCount}</strong>
                                            <span>Evidence pieces</span>
                                        </div>
                                    </div>
                                    <p className="summary-recommendation"><strong>{recommendationLabel}</strong> — {summaryRecommendation}</p>
                                </div>
                            )}
                        </section>
                    </section>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<PerspectiveAI />);
    </script>
</body>
</html>
